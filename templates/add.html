{% extends 'base.html' %}

{% block content %}
<h2>Новая запись</h2>
<form method="POST" class="diary-form">
    <div class="form-group">
        <label for="title">Заголовок</label>
        <input type="text" id="title" name="title" required placeholder="Введите заголовок записи...">
    </div>
    <div class="form-group">
        <label for="content">Текст записи</label>
        <textarea id="content" name="content" rows="10" required placeholder="Опишите ваши мысли здесь..."></textarea>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn">Сохранить</button>
        <a href="{{ url_for('index') }}" class="btn-cancel">Отмена</a>
    </div>
</form>
{% endblock %}
