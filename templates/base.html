<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Личный дневник{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="container">
            <h1>📖 Личный дневник</h1>
            <nav>
                <a href="{{ url_for('index') }}">Главная</a>
                <a href="{{ url_for('add') }}">Новая запись</a>
                <a href="{{ url_for('filter_week') }}">За неделю</a>
            </nav>
            <form action="/search" method="GET" class="search-form">
                <input type="text" name="q" placeholder="Поиск по заголовку..." required>
                <button type="submit">Найти</button>
            </form>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026. Разработчик: Твоё Имя</p>
        </div>
    </footer>
</body>
</html>
